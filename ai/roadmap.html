<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roadmap · jgr-ui</title>
  <style>
    /* ── Variables lolve ───────────────────────────────── */
    :root {
      --stroke-purple-light:        #9181f9;
      --stroke-purple-light-middle: #7c6af7;
      --stroke-purple-light-trigger:#4d3fa0;
      --stroke-purple-darker:       #4d3fa0;
      --lolve-purple:               #c5b5f0;
      --lolve-purple-dark:          #4d3fa0;
      --lolve-blue:                 #a8b4f0;
      --lolve-bright:               #e8c87a;
      --lolve-brighter:             #c97844;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #12121a;
      color: rgba(255,255,255,0.80);
      font-family: monospace;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Graph panel ───────────────────────────────────── */
    #graph-panel {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    #graph-svg {
      width: 100%;
      height: 100%;
      cursor: grab;
    }
    #graph-svg:active { cursor: grabbing; }

    /* ── orb-lines (DirectRenderer.vue style) ─────────── */
    .orb-line {
      stroke: var(--stroke-purple-light);
      stroke-width: 0.8;
      fill: none;
      opacity: 0.35;
      transition: opacity 0.2s, stroke-width 0.2s;
    }
    .orb-line.highlight {
      opacity: 0.9;
      stroke-width: 1.5;
    }
    .orb-line.dim { opacity: 0.05; }

    /* ── Vertex circles ────────────────────────────────── */
    .vertex { cursor: pointer; }
    .vertex .vertex-circle {
      transition: stroke-width 0.15s, filter 0.15s;
    }
    .vertex:hover .vertex-circle,
    .vertex.active .vertex-circle {
      stroke-width: 2.2;
      filter: url(#glow);
    }
    .vertex .halo { transition: opacity 0.15s; }
    .vertex:hover .halo,
    .vertex.active .halo { opacity: 0.2; }

    /* ── Header ────────────────────────────────────────── */
    #header {
      position: absolute;
      top: 16px; left: 16px;
      pointer-events: none;
    }
    #header .meta {
      font-size: 9px;
      color: var(--stroke-purple-light-middle);
      opacity: 0.5;
      padding-left: 24px;
    }

    /* ── Stats pill ────────────────────────────────────── */
    #stats-bar {
      position: absolute;
      bottom: 16px; left: 16px;
      display: flex; gap: 12px;
      pointer-events: none;
    }
    .stat-pill {
      font-size: 9px;
      color: rgba(255,255,255,0.25);
      font-family: monospace;
    }

    /* ── Spine nodes (anneau doré) ─────────────────── */
    .spine-node .spine-ring {
      animation: spine-pulse 2.4s ease-in-out infinite;
    }
    @keyframes spine-pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 0.9; }
    }

  </style>
</head>
<body>
